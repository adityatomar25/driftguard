# DriftGuard API – FastAPI backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: driftguard-api
  namespace: driftguard
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: driftguard
spec:
  replicas: 1          # SQLite is single-writer; scale with a real DB later
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: driftguard
    spec:
      containers:
        - name: api
          image: driftguard-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DRIFTGUARD_DB_URL
              valueFrom:
                configMapKeyRef:
                  name: driftguard-config
                  key: DRIFTGUARD_DB_URL
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config-rules
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/metrics
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/metrics
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: driftguard-data
        - name: config-rules
          configMap:
            name: driftguard-config
            items:
              - key: config.yml
                path: config.yml
