# Persistent storage for the SQLite database
# Shared by the API and the Scheduler CronJob
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: driftguard-data
  namespace: driftguard
  labels:
    app.kubernetes.io/part-of: driftguard
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
