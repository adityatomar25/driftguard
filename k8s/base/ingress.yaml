# Ingress – routes external traffic to frontend & API
# Requires an Ingress Controller (nginx-ingress, traefik, etc.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: driftguard-ingress
  namespace: driftguard
  labels:
    app.kubernetes.io/part-of: driftguard
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: driftguard.local           # Change to your domain
      http:
        paths:
          # API backend: driftguard.local/api/*
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: driftguard-api
                port:
                  number: 8000
          # Frontend: driftguard.local/*
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: driftguard-frontend
                port:
                  number: 80
