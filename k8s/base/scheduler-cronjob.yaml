# DriftGuard Scheduler – runs drift detection on a cron schedule
apiVersion: batch/v1
kind: CronJob
metadata:
  name: driftguard-scheduler
  namespace: driftguard
  labels:
    app.kubernetes.io/name: scheduler
    app.kubernetes.io/part-of: driftguard
spec:
  schedule: "*/5 * * * *"         # Every 5 minutes (adjust as needed)
  concurrencyPolicy: Forbid       # Never overlap runs
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600   # Kill if stuck > 10 min
      template:
        metadata:
          labels:
            app.kubernetes.io/name: scheduler
            app.kubernetes.io/part-of: driftguard
        spec:
          restartPolicy: OnFailure
          containers:
            - name: scheduler
              image: driftguard-api:latest       # Same image, different entrypoint
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - driftguard.scheduler
              args:
                - "--tf-dir"
                - "/terraform"
                - "--rules"
                - "/config/config.yml"
                - "--db"
                - "sqlite:////data/driftguard.db"
                - "--max-runs"
                - "1"
                - "--skip-init"
              env:
                - name: DRIFTGUARD_DB_URL
                  valueFrom:
                    configMapKeyRef:
                      name: driftguard-config
                      key: DRIFTGUARD_DB_URL
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: config-rules
                  mountPath: /config
                - name: terraform
                  mountPath: /terraform
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: driftguard-data
            - name: config-rules
              configMap:
                name: driftguard-config
                items:
                  - key: config.yml
                    path: config.yml
            - name: terraform
              emptyDir: {}           # Replace with your Terraform source in prod
